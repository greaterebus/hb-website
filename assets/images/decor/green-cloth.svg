<svg xmlns="http://www.w3.org/2000/svg" width="360" height="360" viewBox="0 0 360 360">
  <filter id="cloth" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency=".018" numOctaves="4" seed="31" stitchTiles="stitch" result="mottle"/>
    <feColorMatrix in="mottle" values=".10 0 0 0 .10 0 .16 0 0 .14 0 0 .08 0 .06 0 0 0 .34 0" result="tone"/>
    <feTurbulence type="turbulence" baseFrequency=".48 .025" numOctaves="2" seed="12" stitchTiles="stitch" result="threads"/>
    <feColorMatrix in="threads" values=".12 0 0 0 .08 0 .13 0 0 .10 0 0 .08 0 .04 0 0 0 .16 0" result="weave"/>
    <feBlend in="tone" in2="weave" mode="soft-light"/>
  </filter>
  <rect width="360" height="360" filter="url(#cloth)" opacity=".9"/>
  <g fill="none" stroke="#d1b46d" opacity=".025" stroke-width="1"><circle cx="70" cy="85" r="52"/><circle cx="288" cy="278" r="68"/></g>
</svg>
