<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700" role="img" aria-label="Handcrafted jewelry photo placeholder">
	<rect width="900" height="700" fill="#2b3527"/>
	<rect width="900" height="700" fill="url(#hb-hero-vignette)"/>
	<defs>
		<radialGradient id="hb-hero-vignette" cx="50%" cy="42%" r="75%">
			<stop offset="0%" stop-color="#3a4a35"/>
			<stop offset="100%" stop-color="#20291c"/>
		</radialGradient>
	</defs>

	<!-- wooden chest silhouette -->
	<g opacity="0.85">
		<rect x="560" y="430" width="260" height="150" rx="10" fill="#4a3524"/>
		<rect x="560" y="430" width="260" height="36" rx="10" fill="#5c4530"/>
		<rect x="670" y="410" width="40" height="26" rx="6" fill="#c9a227"/>
	</g>

	<!-- moss patch -->
	<ellipse cx="700" cy="600" rx="220" ry="40" fill="#3d4a30" opacity="0.6"/>
	<ellipse cx="230" cy="620" rx="180" ry="30" fill="#3d4a30" opacity="0.5"/>

	<!-- ring -->
	<g transform="translate(250,300)" stroke="#e7d9ad" stroke-width="6" fill="none">
		<circle r="70" />
		<circle r="70" stroke="#c9a227" stroke-width="2" />
	</g>
	<polygon points="250,205 275,240 250,270 225,240" fill="#6b6ad6" stroke="#e7d9ad" stroke-width="4"/>

	<!-- pendant + chain -->
	<g transform="translate(470,220)">
		<path d="M0,-140 C40,-100 40,-40 0,-10 C-40,-40 -40,-100 0,-140 Z" fill="none" stroke="#e7d9ad" stroke-width="5"/>
		<circle r="46" cy="60" fill="none" stroke="#c9a227" stroke-width="6"/>
		<circle r="16" cy="60" fill="#7a3f8f"/>
	</g>

	<!-- compass pendant -->
	<g transform="translate(650,260)" stroke="#e7d9ad" stroke-width="4" fill="none">
		<circle r="60"/>
		<polygon points="0,-40 10,0 0,40 -10,0" fill="#c9a227" stroke="none"/>
		<circle r="4" fill="#e7d9ad" stroke="none"/>
	</g>
</svg>
